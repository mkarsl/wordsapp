<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kelime Ustası Pro - Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <h1 onclick="showLandingMenu()" style="cursor:pointer">Ana Menü</h1>
                <div id="sub-nav-levels" onclick="backToLevels()" style="display:none; cursor:pointer;">Seviyeler</div>
            </div>
            <div class="header-right">
                <div class="status-group">
                    <div id="timer-display" class="timer-badge" style="display:none;">⏱️ <span id="time-left">10</span></div>
                    <div id="streak-badge" class="streak-badge" style="display:none;">🔥 <span id="streak-count">0</span></div>
                    <button id="hint-btn" class="hint-btn-header" style="display:none;" onclick="useHint()">💡</button>
                    <div class="badge-status">🥇 <span id="total-badges">0</span></div>
                    <div class="coin-status">💰 <span id="coin-count">0</span></div>
                </div>
            </div>
        </div>

        <div id="landing-menu" class="menu-screen">
            <div class="mode-container">
                <button class="mode-card-btn" onclick="openMode('normal')">
                    <span class="mode-icon">📚</span>
                    <div class="mode-info"><strong>Klasik</strong><small>10 Seviye</small></div>
                </button>
                <button class="mode-card-btn" onclick="openMode('timed')">
                    <span class="mode-icon">⚡</span>
                    <div class="mode-info"><strong>Zamana Karşı</strong><small>Hızlı ve Zorlu</small></div>
                </button>
                <button class="mode-card-btn repeat-special" onclick="openMode('repeat')">
                    <span class="mode-icon">🔄</span>
                    <div class="mode-info"><strong>Tekrar Edilmeli</strong><small id="repeat-count">Hata Yok</small></div>
                </button>
            </div>
        </div>

        <div id="main-menu" class="menu-screen" style="display:none;">
            <div class="menu-header">
                <h2 id="current-mode-title"></h2>
            </div>
            <div id="level-list" class="level-grid"></div>
        </div>

        <div id="game-area" style="display:none;">
            <div id="play-screen">
                <div class="level-info">
                    <div class="progress-wrapper">
                        <div class="progress-container"><div id="progress-bar" class="progress-fill"></div></div>
                        <span id="progress-text">0 / 0</span>
                    </div>
                </div>
                <div id="question-box">
                    <div id="word-card" class="card">
                        <div id="word" class="word-text"></div>
                        <button class="speaker-btn" onclick="speakWord()">🔊</button>
                    </div>
                    <div id="options-container" class="options-grid"></div>
                </div>
            </div>

            <div id="finish-screen" style="display:none;">
                <div class="finish-content">
                    <div class="finish-icon">🏆</div>
                    <h2 class="finish-title">Tebrikler!</h2>
                    <div class="finish-actions">
                        <button class="btn-modern-primary" onclick="resetAndRetry()">🔄 Tekrarla</button>
                        <button class="btn-modern-secondary" onclick="backToLevels()">Seviye Listesi</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
